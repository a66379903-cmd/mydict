<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>MyDict v1.6 Fixed Save</title>

<link href="https://cdn.jsdelivr.net/npm/tabulator-tables@5.5.0/dist/css/tabulator.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/tabulator-tables@5.5.0/dist/js/tabulator.min.js"></script>

<style>
body{
    font-family:-apple-system;
    margin:10px;
}

#search{
    width:100%;
    padding:12px;
    margin-bottom:10px;
    font-size:16px;
}

#log{
    height:140px;
    background:#111;
    color:#0f0;
    overflow:auto;
    font-size:12px;
    padding:8px;
    margin-bottom:10px;
}

button{
    padding:10px;
    margin-bottom:10px;
}

.chip{
    display:inline-block;
    padding:2px 8px;
    margin:2px;
    border-radius:12px;
    background:#eaeaea;
    font-size:12px;
}
</style>
</head>

<body>

<div>MyDict v1.6 FIXED</div>

<input id="search" placeholder="search..." />
<br>

<button onclick="saveToGitHub()">💾 SAVE TO GITHUB</button>

<pre id="log"></pre>

<div id="table"></div>

<script>

function log(msg){
    document.getElementById("log").innerText += msg + "\n";
}

// ================= CONFIG =================
const CONFIG = {
    repo: "a66379903-cmd/mydict",
    file: "mydict.json"
};

// 🔥 防缓存
const DATA_URL =
"https://raw.githubusercontent.com/a66379903-cmd/mydict/main/mydict.json?t=" + Date.now();

// ================= TOKEN =================
async function loadToken(){

    log("LOAD TOKEN PARTS...");

    let a = await fetch("t1.json").then(r => r.json());
    let b = await fetch("t2.json").then(r => r.json());

    let token = (a.p1 || "") + (b.p2 || "");

    log("TOKEN LENGTH: " + token.length);

    return token;
}

let table;

// ================= LOAD DATA =================
fetch(DATA_URL, {cache:"no-store"})
.then(r => r.json())
.then(data => {

    data = data.items.map(item => {

        let s = item.senses?.[0] || {};

        return {
            id:item.id,
            word:item.word,
            meaning:(s.meaning || []).join(","),
            tag:s.tag || [],
            score:item.id
        };

    });

    table = new Tabulator("#table", {

        data:data,

        layout:"fitColumns",

        height:"65vh",

        columns:[

            {
                title:"Word",
                field:"word",
                cellClick:editCell
            },

            {
                title:"Meaning",
                field:"meaning",
                cellClick:editCell
            },

            {
                title:"Tag",
                field:"tag",

                formatter:function(cell){

                    let v = cell.getValue();

                    return Array.isArray(v)
                        ? v.map(t=>`<span class="chip">${t}</span>`).join(" ")
                        : "";
                },

                cellClick:editCell
            },

            {
                title:"Score",
                field:"score",
                cellClick:editCell
            }
        ]
    });

    log("TABLE READY");

})
.catch(e=>{

    log("LOAD ERROR:");
    log(e.toString());

});

// ================= EDIT =================
function editCell(e, cell){

    let v = cell.getValue();

    let input =
        Array.isArray(v)
        ? v.join(",")
        : v;

    let nv = prompt("edit:", input);

    if(nv === null) return;

    let final =
        Array.isArray(v)
        ? nv.split(",").map(x=>x.trim()).filter(x=>x)
        : nv;

    cell.setValue(final);

    log("EDITED: " + cell.getField());
}

// ================= SAVE =================
async function saveToGitHub(){

    log("========== SAVE START ==========");

    try {

        let token = await loadToken();

        if(!token || token.length < 10){

            log("TOKEN INVALID");
            return;
        }

        // 🔥 核心修复：直接取表格最新数据
        let latestData = table.getData();

        log("LATEST ROWS: " + latestData.length);

        let json = {

            items: latestData.map(d => ({

                id:d.id,

                word:d.word,

                senses:[{

                    meaning:d.meaning
                        ? d.meaning.split(",")
                        : [],

                    tag:Array.isArray(d.tag)
                        ? d.tag
                        : []

                }]
            }))
        };

        let content = btoa(
            unescape(
                encodeURIComponent(
                    JSON.stringify(json, null, 2)
                )
            )
        );

        // ================= GET SHA =================
        log("GET SHA...");

        let shaRes = await fetch(

            `https://api.github.com/repos/${CONFIG.repo}/contents/${CONFIG.file}`,

            {
                headers:{
                    "Authorization":"Bearer " + token
                }
            }
        );

        let shaText = await shaRes.text();

        let shaData = JSON.parse(shaText);

        if(!shaData.sha){

            log("NO SHA FOUND");
            return;
        }

        log("SHA OK");

        // ================= UPDATE =================
        log("SENDING UPDATE...");

        let res = await fetch(

            `https://api.github.com/repos/${CONFIG.repo}/contents/${CONFIG.file}`,

            {
                method:"PUT",

                headers:{
                    "Authorization":"Bearer " + token,
                    "Content-Type":"application/json"
                },

                body: JSON.stringify({

                    message:"update dict",

                    content:content,

                    sha:shaData.sha
                })
            }
        );

        let text = await res.text();

        let result = JSON.parse(text);

        if(result.commit){

            log("✔ SAVE SUCCESS");

        } else {

            log("❌ SAVE FAILED");
            log(text);
        }

    } catch(err){

        log("FATAL ERROR:");
        log(err.toString());
    }
}

// ================= SEARCH =================
document.getElementById("search").addEventListener("input", e=>{

    let v = e.target.value.toLowerCase();

    if(!table) return;

    if(!v){

        table.clearFilter();
        return;
    }

    table.setFilter(d =>

        (d.word && d.word.toLowerCase().includes(v))

        ||

        (d.meaning && d.meaning.toLowerCase().includes(v))

        ||

        (Array.isArray(d.tag) &&
        d.tag.join(" ").toLowerCase().includes(v))
    );

});

</script>

</body>
</html>
