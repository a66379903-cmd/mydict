<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>My Dict iOS Stable</title>

<link href="https://cdn.jsdelivr.net/npm/tabulator-tables@5.5.0/dist/css/tabulator.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/tabulator-tables@5.5.0/dist/js/tabulator.min.js"></script>

<style>
body{
  font-family: -apple-system, Arial;
  margin:10px;
}

#search{
  width:100%;
  padding:12px;
  font-size:16px;
  margin-bottom:10px;
}

#log{
  height:120px;
  overflow:auto;
  background:#111;
  color:#0f0;
  font-size:12px;
  padding:8px;
  margin-bottom:10px;
}

.chip{
  display:inline-block;
  padding:2px 8px;
  margin:2px;
  border-radius:12px;
  background:#eaeaea;
  font-size:12px;
}
</style>
</head>

<body>
<br>
  改进版
<br/>
<input id="search" placeholder="Search word / meaning / tag..." />

<pre id="log"></pre>

<div id="table"></div>

<script>

function log(msg){
    document.getElementById("log").innerText += msg + "\n";
}

const DATA_URL =
"https://raw.githubusercontent.com/a66379903-cmd/mydict/main/mydict.json";

let table;

log("PAGE LOADED");
log("FETCH START...");

// ---------------------------
// FETCH
// ---------------------------
fetch(DATA_URL, { cache: "no-store" })
.then(res => {
    log("HTTP STATUS: " + res.status);
    return res.json();
})
.then(data => {

    log("DATA RECEIVED");

    if(!data.items){
        log("ERROR: no items");
        data = [];
    } else {
        data = data.items;
    }

    // 🔥 核心：扁平化数据
    data = data.map(item => {

        let firstSense = item.senses?.[0] || {};

        return {
            word: item.word,
            meaning: (firstSense.meaning || []).join(","),
            tag: firstSense.tag || [],
            score: item.id
        };

    });

    log("FLATTEN DONE");
    log("DATA LENGTH: " + data.length);

    table = new Tabulator("#table", {
        data: data,
        layout: "fitColumns",
        height: "70vh",

        columns: [
            {title:"Word", field:"word"},
            {title:"Meaning", field:"meaning"},
            {title:"Tag", field:"tag",
                formatter:function(cell){
                    let val = cell.getValue();
                    if(!Array.isArray(val)) return "";
                    return val.map(t => `<span class="chip">${t}</span>`).join(" ");
                }
            },
            {title:"Score", field:"score"}
        ]
    });

    log("TABLE READY");
})
})
.catch(err=>{
    log("FETCH ERROR: " + err);
});

// ---------------------------
// SEARCH
// ---------------------------
const input = document.getElementById("search");

let timer;

input.addEventListener("input", function(e){

    const v = e.target.value.trim().toLowerCase();

    log("SEARCH: " + v);

    clearTimeout(timer);

    timer = setTimeout(()=>{

        if(!table){
            log("TABLE NOT READY");
            return;
        }

        if(v === ""){
            table.clearFilter();
            log("FILTER CLEARED");
            return;
        }

        table.setFilter(function(data){

            return (
                (data.word && data.word.toLowerCase().includes(v)) ||
                (data.meaning && data.meaning.toLowerCase().includes(v)) ||
                (Array.isArray(data.tag) && data.tag.join(" ").toLowerCase().includes(v))
            );

        });

    }, 120);

});

</script>

</body>
</html>
