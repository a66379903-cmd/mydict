<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>My Dict v1.4 Test Token Split</title>

<link href="https://cdn.jsdelivr.net/npm/tabulator-tables@5.5.0/dist/css/tabulator.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/tabulator-tables@5.5.0/dist/js/tabulator.min.js"></script>

<style>
body{font-family:-apple-system;margin:10px;}
#search{width:100%;padding:12px;margin-bottom:10px;font-size:16px;}
#log{height:120px;background:#111;color:#0f0;overflow:auto;font-size:12px;padding:8px;margin-bottom:10px;}
button{padding:10px;margin-bottom:10px;}
.chip{display:inline-block;padding:2px 8px;margin:2px;border-radius:12px;background:#eaeaea;font-size:12px;}
</style>
</head>

<body>

<div>MyDict v1.4 test (split token)</div>

<input id="search" placeholder="search..." />
<br>

<button onclick="saveToGitHub()">💾 Save</button>

<pre id="log"></pre>

<div id="table"></div>

<script>

function log(msg){
    document.getElementById("log").innerText += msg + "\n";
}

const DATA_URL = "https://raw.githubusercontent.com/a66379903-cmd/mydict/main/mydict.json";

const T1_URL = "t1.json";
const T2_URL = "t2.json";

const REPO = "a66379903-cmd/mydict";
const FILE = "mydict.json";

let table;
let currentData = [];

// ================= LOAD TOKEN =================
async function loadToken(){

    log("loading token parts...");

    let a = await fetch(T1_URL).then(r => r.json());
    let b = await fetch(T2_URL).then(r => r.json());

    let token = a.p1 + b.p2;

    log("token ready");
    return token;
}

// ================= LOAD DATA =================
fetch(DATA_URL, {cache:"no-store"})
.then(r => r.json())
.then(data => {

    data = data.items.map(item => {
        let s = item.senses?.[0] || {};
        return {
            id:item.id,
            word:item.word,
            meaning:(s.meaning||[]).join(","),
            tag:s.tag||[],
            score:item.id
        };
    });

    currentData = data;

    table = new Tabulator("#table", {
        data:data,
        layout:"fitColumns",
        height:"65vh",

        columns:[
            {title:"Word", field:"word", cellClick:edit},
            {title:"Meaning", field:"meaning", cellClick:edit},
            {
                title:"Tag",
                field:"tag",
                formatter:function(cell){
                    let v = cell.getValue();
                    return Array.isArray(v)
                        ? v.map(t=>`<span class="chip">${t}</span>`).join(" ")
                        : "";
                },
                cellClick:edit
            },
            {title:"Score", field:"score", cellClick:edit}
        ]
    });

    log("table ready");
});

// ================= EDIT =================
function edit(e, cell){

    let v = cell.getValue();
    let input = Array.isArray(v) ? v.join(",") : v;

    let nv = prompt("edit:", input);
    if(nv === null) return;

    let final = Array.isArray(v)
        ? nv.split(",").map(x=>x.trim()).filter(x=>x)
        : nv;

    cell.setValue(final);

    log("edited " + cell.getField());
}

// ================= SAVE =================
async function saveToGitHub(){

    log("save start");

    let token = await loadToken();

    let json = {
        items: currentData.map(d => ({
            id:d.id,
            word:d.word,
            senses:[{
                meaning:d.meaning?d.meaning.split(","):[],
                tag:Array.isArray(d.tag)?d.tag:[]
            }]
        }))
    };

    let content = btoa(unescape(encodeURIComponent(JSON.stringify(json, null, 2))));

    // get sha
    let shaRes = await fetch(
        `https://api.github.com/repos/${REPO}/contents/${FILE}`,
        {
            headers:{
                "Authorization":"Bearer " + token
            }
        }
    );

    let shaData = await shaRes.json();

    // commit
    let res = await fetch(
        `https://api.github.com/repos/${REPO}/contents/${FILE}`,
        {
            method:"PUT",
            headers:{
                "Authorization":"Bearer " + token,
                "Content-Type":"application/json"
            },
            body: JSON.stringify({
                message:"update dict",
                content:content,
                sha:shaData.sha
            })
        }
    );

    let r = await res.json();

    log("save done");
    log(JSON.stringify(r));
}

// ================= SEARCH =================
document.getElementById("search").addEventListener("input", e=>{

    let v = e.target.value.toLowerCase();

    if(!table) return;

    if(!v){
        table.clearFilter();
        return;
    }

    table.setFilter(d =>
        (d.word && d.word.toLowerCase().includes(v)) ||
        (d.meaning && d.meaning.toLowerCase().includes(v)) ||
        (Array.isArray(d.tag) && d.tag.join(" ").toLowerCase().includes(v))
    );
});

</script>

</body>
</html>
